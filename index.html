<!-- @startingPoint section="Landing" subtitle="Plan Anticaos — full cinematic landing page" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plan Anticaos · Vida o Nada</title>
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="./campaign.css">
<style>
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--von-ink-black);
    color:var(--von-cream);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:var(--accent-on)}
  a{color:inherit}
  .von-grain{position:absolute;inset:0;pointer-events:none;background-image:var(--grain-url);background-repeat:repeat;opacity:.5;mix-blend-mode:overlay;z-index:1}
  section{position:relative}
  .wrap{max-width:var(--maxw-content);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease-out),transform .7s var(--ease-out)}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
</style>
</head>
<body>
<div id="root"></div>

<!-- Campaign atmosphere: surveillance HUD + CRT/grain/vignette overlays -->
<!-- film-roll edges -->
<div class="film-strip film-left"></div>
<div class="film-strip film-right"></div>
<!-- camera viewfinder: focus corners + center reticle -->
<div class="vf vf-tl"></div><div class="vf vf-tr"></div><div class="vf vf-bl"></div><div class="vf vf-br"></div>
<!-- recording + camera readout -->
<div class="hud hud-tl"><span class="rec-dot"></span>REC <span id="tc">00:00:00</span></div>
<div class="hud hud-tc">RUMBO 41°N · 02°E</div>
<div class="hud hud-tr"><span class="cam-val">ISO 400</span> · <span class="cam-val">f/1.4</span> · <span class="cam-val">1/125</span></div>
<!-- screen overlays -->
<div class="fx-grain"></div>
<div class="fx-map"></div>
<div class="fx-scan"></div>
<div class="fx-screen"></div>
<div class="fx-vignette"></div>

<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<script src="./_ds_bundle.js"></script>
<script src="./sections.js"></script>
<script src="./app.js"></script>
<script>
  /* Safety net: scroll-reveal animations start at opacity:0 and rely on
     IntersectionObserver. If (and only if) nothing has revealed shortly after
     load — e.g. IO never fires — force every block visible so the page can
     never get stuck blank. Normal viewports reveal via IO first, so this is a
     no-op for real users and the scroll animation is preserved. */
  window.addEventListener("load", function () {
    setTimeout(function () {
      var all = document.querySelectorAll(".reveal");
      var shown = document.querySelectorAll(".reveal.in");
      if (all.length && shown.length === 0) {
        all.forEach(function (el) { el.classList.add("in"); });
      }
    }, 1500);
  });
</script>
<script>
  /* Live REC timecode — sells the "this is being recorded" feel. */
  (function () {
    var el = document.getElementById("tc");
    if (!el) return;
    var s = 0;
    var p = function (n) { return String(n).padStart(2, "0"); };
    setInterval(function () {
      s++;
      el.textContent = p(Math.floor(s / 3600)) + ":" + p(Math.floor(s / 60) % 60) + ":" + p(s % 60);
    }, 1000);
  })();
</script>
</body>
</html>
