<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plan Anticaos · Vida o Nada</title>
<link rel="stylesheet" href="./styles.css">
<style>
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--von-ink-black);
    color:var(--von-cream);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:var(--accent-on)}
  a{color:inherit}
  .von-grain{position:absolute;inset:0;pointer-events:none;background-image:var(--grain-url);background-repeat:repeat;opacity:.5;mix-blend-mode:overlay;z-index:1}
  section{position:relative}
  .wrap{max-width:var(--maxw-content);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease-out),transform .7s var(--ease-out)}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="./_ds_bundle.js"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
